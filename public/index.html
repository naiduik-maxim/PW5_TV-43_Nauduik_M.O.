<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Моніторинг споживання підприємства</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body>
        <div class="container mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Моніторинг підприємства</h1>
                <div>Статус з'єднання: <span id="status" class="status-offline">Офлайн</span></div>
            </div>

            <div class="row">
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6 class="text-muted">Загальне споживання</h6>
                        <h3 id="totalPower" class="text-primary fw-bold">-- МВт</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6 class="text-muted">Пікове навантаження</h6>
                        <h3 id="peakLoad" class="text-danger fw-bold">-- МВт</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6 class="text-muted">Коеф. попиту</h6>
                        <h3 id="demandCoeff" class="text-info fw-bold">--</h3>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="metric-card">
                        <h6 class="text-muted">Прогноз витрат (доба)</h6>
                        <h3 id="costForecast" class="text-success fw-bold">-- грн</h3>
                    </div>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col-md-8">
                    <div class="chart-container">
                        <h5 class="mb-3">Добовий профіль навантаження</h5>
                        <canvas id="loadProfileChart"></canvas>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="chart-container">
                        <h5 class="mb-3">Споживання по цехах</h5>
                        <canvas id="workshopsPieChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="row mt-2">
                <div class="col-md-12">
                    <div class="chart-container">
                        <h5 class="mb-3">Історія споживання</h5>
                        <div id="dataTable" class="table-responsive"></div>
                    </div>
                </div>
            </div>
        </div>

	    <script src="script.js"></script>
    </body>
</html>
